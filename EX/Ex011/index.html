<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/Icon Gabriel Life Journey/favicon.ico" type="image/x-icon">
    <title>Mídias em HTML</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir esse arquivo em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador.</p>

    <picture>
        <source media="(max-width: 750px)" srcset="imgs/foto-p.png" type="image/png">
        <source media="(max-width:1000px)" srcset="imgs/foto-m.png" type="image/png">
        <img src="imgs/foto-g.png" alt="imagem flexível"> 
    </picture>
    <h2>Reproduzindo Àudio</h2>
    <p>Vamos aprender a reproduzir áudios em HTML 5.</p>

    <audio src="midia/Bubble Bath - The Green Orbs.mp3" controls></audio>  <!--autoplay-->
    
    <audio preload="metadata">
        <source src="midia/gabriel-33" type="audio/mpeg">
        <source src="midia/gabriel-34" type="audio/ogg">
        <source src="midia/gabriel-35" type="audio/wav">
        <p>infelizmente seu navegador não consegue reproduzir áudio. <a href="midia/gabriel-33" type="audio/mpeg">Clique aqui para baixar o arquivo MP3</a></p>
    </audio>

    

    
</body>
</html>
